<svg
  width="120"
  height="120"
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="TypeScript logo"
>
  <defs>
    <!-- Máscara para recorte -->
    <mask id="cutout">
      <rect width="100%" height="100%" fill="white"/>

      <text
        x="50%"
        y="52%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="46"
        font-weight="900"
        font-family="Poppins, Inter, Segoe UI, system-ui, sans-serif"
        letter-spacing="-1"
        fill="black"
      >
        TS
      </text>
    </mask>

    <!-- Sombra suave -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="-2" dy="-2" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Círculo -->
  <circle
    cx="60"
    cy="60"
    r="52"
    fill="#e6ebf1"
    mask="url(#cutout)"
    filter="url(#softShadow)"
  />
</svg>
